<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 09: The Volcanic Lore</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #050510;
            color: white;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 70%, rgba(0, 255, 255, 0.12), transparent 26%),
                radial-gradient(circle at 72% 40%, rgba(255, 90, 0, 0.16), transparent 28%),
                radial-gradient(circle at 50% 100%, #2d112d 0%, #090912 74%);
        }

        .bg-layer {
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(rgba(255, 255, 255, 0.12) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03), transparent 30%);
            background-size: 24px 24px, 100% 100%;
            opacity: 0.45;
        }

        .ambient-glow {
            position: absolute;
            border-radius: 999px;
            filter: blur(60px);
            pointer-events: none;
        }

        .ambient-glow.cyan {
            left: -8vw;
            bottom: 8vh;
            width: 24vw;
            height: 24vw;
            background: rgba(0, 255, 255, 0.18);
        }

        .ambient-glow.orange {
            right: 8vw;
            top: 8vh;
            width: 28vw;
            height: 28vw;
            background: rgba(255, 85, 0, 0.12);
        }

        .spawn-pad {
            position: absolute;
            left: 0;
            bottom: 17vh;
            width: 18vw;
            min-width: 180px;
            height: 3.2vh;
            min-height: 22px;
            background: linear-gradient(to right, #18d7ff, #18a8ff);
            box-shadow: 0 0 28px rgba(24, 215, 255, 0.45);
        }

        .button-block {
            position: absolute;
            left: 31vw;
            top: 38vh;
            width: 8vw;
            min-width: 86px;
            height: 8vw;
            min-height: 86px;
            max-height: 110px;
            background: linear-gradient(145deg, #ff2a12, #c60000);
            box-shadow: 0 0 18px rgba(255, 40, 0, 0.45);
        }

        .button-block::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(255, 255, 255, 0.14);
        }

        .stone-bridge {
            position: absolute;
            left: 43vw;
            top: 67vh;
            width: 21vw;
            min-width: 220px;
            height: 2.8vh;
            min-height: 20px;
            background: #9b6666;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
        }

        .main-support {
            position: absolute;
            left: 62.8vw;
            top: 24vh;
            width: 1.2vw;
            min-width: 12px;
            height: 60vh;
            background: #9b6666;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .right-frame {
            position: absolute;
            left: 77vw;
            top: 24vh;
            width: 1vw;
            min-width: 10px;
            height: 60vh;
            background: #6d6d6d;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .top-beam {
            position: absolute;
            left: 63.4vw;
            top: 24vh;
            width: 20vw;
            min-width: 220px;
            height: 1.9vh;
            min-height: 14px;
            background: linear-gradient(to right, #9b6666 0 70%, #6d6d6d 70% 100%);
        }

        .top-beam::before,
        .top-beam::after {
            content: "";
            position: absolute;
            top: -4.2vh;
            width: 0.9vw;
            min-width: 9px;
            height: 4.2vh;
            background: #ff180d;
            box-shadow: 0 0 12px rgba(255, 24, 13, 0.35);
        }

        .top-beam::before {
            left: 3.2vw;
        }

        .top-beam::after {
            right: 3.2vw;
        }

        .mid-ledge {
            position: absolute;
            left: 63.4vw;
            top: 58vh;
            width: 20vw;
            min-width: 220px;
            height: 1.9vh;
            min-height: 14px;
            background: linear-gradient(to right, #9b6666 0 68%, #6d6d6d 68% 100%);
        }

        .mid-ledge::before {
            content: "";
            position: absolute;
            left: 8.2vw;
            top: -0.1vh;
            width: 6vw;
            min-width: 58px;
            height: 1.6vh;
            min-height: 12px;
            background: linear-gradient(to right, #ff180d 0 78%, #cb2c2c 78% 100%);
            box-shadow: 0 0 10px rgba(255, 24, 13, 0.3);
        }

        .ladder {
            position: absolute;
            left: 59vw;
            top: 24vh;
            width: 4.2vw;
            min-width: 44px;
            height: 43vh;
            background:
                repeating-linear-gradient(
                    to bottom,
                    transparent 0,
                    transparent 4.3vh,
                    rgba(0, 0, 0, 0.45) 4.3vh,
                    rgba(0, 0, 0, 0.45) 4.55vh
                ),
                rgba(220, 220, 220, 0.88);
            box-shadow:
                inset 1px 0 0 rgba(0, 0, 0, 0.42),
                inset -1px 0 0 rgba(0, 0, 0, 0.42);
        }

        .lava-fall,
        .ice-water {
            position: absolute;
            left: 64vw;
            width: 13vw;
            min-width: 140px;
        }

        .lava-fall {
            top: 32vh;
            height: 23vh;
            background: linear-gradient(to bottom, #ff8768, #ff6248);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .ice-water {
            top: 62vh;
            height: 22vh;
            background: linear-gradient(to bottom, #4f88e8, #3c78de);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .goal-ledge {
            position: absolute;
            right: 7vw;
            top: 52vh;
            width: 11vw;
            min-width: 120px;
            height: 1.9vh;
            min-height: 14px;
            background: #6d6d6d;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.32);
        }

        .goal-area {
            position: absolute;
            right: 10vw;
            top: 45vh;
            width: 120px;
            height: 120px;
        }

        .coins {
            position: absolute;
            left: 0;
            bottom: 10px;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffff74 0, #f8ff00 58%, #c7c800 100%);
            box-shadow: 0 0 24px rgba(248, 255, 0, 0.48);
        }

        .sword {
            position: absolute;
            left: 60px;
            bottom: 18px;
            width: 8px;
            height: 86px;
            background: linear-gradient(to bottom, #f2f2f2, #a9a9a9);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
        }

        .sword-hilt {
            position: absolute;
            left: -11px;
            top: 18px;
            width: 30px;
            height: 8px;
            background: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .gem {
            position: absolute;
            left: 10px;
            top: -1px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff87;
            box-shadow: 0 0 12px rgba(0, 255, 135, 0.4);
        }

        .character {
            position: absolute;
            left: 33vw;
            top: 58.5vh;
            width: 42px;
            height: 80px;
            background: #222;
            border: 2px solid #00ffff;
            border-radius: 20px 20px 10px 10px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .character-head {
            position: relative;
            width: 30px;
            height: 30px;
            margin-top: -15px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            background: #111;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .character-eye {
            position: absolute;
            top: 10px;
            right: 5px;
            width: 8px;
            height: 4px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 10px #fff, 0 0 18px #00ffff;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 55%, rgba(0, 0, 0, 0.82) 100%);
            pointer-events: none;
        }

        @media (max-width: 960px) {
            .spawn-pad {
                width: 28vw;
                bottom: 20vh;
            }

            .button-block {
                left: 27vw;
                top: 36vh;
            }

            .stone-bridge {
                left: 39vw;
                top: 70vh;
                width: 28vw;
            }

            .ladder {
                left: 58vw;
                height: 46vh;
            }

            .main-support {
                left: 66vw;
                height: 62vh;
            }

            .right-frame {
                left: 83vw;
                height: 62vh;
            }

            .top-beam,
            .mid-ledge {
                left: 66.5vw;
                width: 21vw;
                min-width: 120px;
            }

            .lava-fall,
            .ice-water {
                left: 67vw;
                width: 16vw;
                min-width: 90px;
            }

            .goal-ledge {
                right: 5vw;
                width: 12vw;
                min-width: 90px;
            }

            .goal-area {
                right: 6vw;
            }

            .character {
                left: 29vw;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="bg-layer"></div>
        <div class="ambient-glow cyan"></div>
        <div class="ambient-glow orange"></div>

        <div class="spawn-pad"></div>
        <div class="button-block"></div>

        <div class="stone-bridge"></div>
        <div class="ladder"></div>
        <div class="main-support"></div>
        <div class="top-beam"></div>
        <div class="mid-ledge"></div>
        <div class="right-frame"></div>

        <div class="lava-fall"></div>
        <div class="ice-water"></div>

        <div class="goal-ledge"></div>
        <div class="goal-area">
            <div class="coins"></div>
            <div class="sword">
                <div class="sword-hilt">
                    <div class="gem"></div>
                </div>
            </div>
        </div>

        <div class="character">
            <div class="character-head">
                <div class="character-eye"></div>
            </div>
        </div>

        <div class="vignette"></div>
    </div>
</body>
</html>
