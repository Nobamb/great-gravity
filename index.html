<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>위대한 중력</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="screen">
      <div id="game-container">
        <div class="bg-layer"></div>
        <div class="ambient-glow cyan"></div>
        <div class="ambient-glow orange"></div>

        <div class="timer-ui">00:00:00</div>

        <div class="spawn-pad" data-collider="solid" data-spawn="player"></div>
        <div class="jump-block" data-collider="solid" data-effect="jump-boost"></div>

        <div class="stone-bridge" data-collider="solid"></div>
        <div class="ladder" data-collider="ladder"></div>
        <div class="main-support" data-collider="solid"></div>
        <div class="top-beam" data-collider="solid"></div>
        <div class="mid-ledge" data-collider="solid">
          <div class="goal-location" data-collider="solid"></div>
        </div>
        <div class="treasure-pile">
          <div class="sword">
            <div class="sword-hilt">
              <div class="gem"></div>
            </div>
          </div>
          <div class="coins-container">
            <div class="coins"></div>
          </div>
        </div>
        <div class="right-frame" data-collider="solid"></div>

        <div class="lava-fall"></div>
        <div class="ice-water"></div>
        <div class="bottom-bar" data-collider="solid"></div>

        <div class="goal-ledge" data-collider="solid"></div>

        <div class="character">
          <div class="character-head">
            <div class="character-eye"></div>
          </div>
        </div>

        <div class="vignette"></div>
      </div>
    </div>
    <script type="module" src="mvc/main.js"></script>
  </body>
</html>
